interface:
  display_name: "xiaoqi-fable"
  short_description: "生成小白 IP 未来寓言风中文文章配图"
  default_prompt: "为这篇中文文章生成小白未来寓言风配图，默认 16:9；如果我指定比例或只要 shot list，请按我的要求执行。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    generic: "neutral-source"
