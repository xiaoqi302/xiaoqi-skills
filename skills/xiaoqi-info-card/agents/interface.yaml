interface:
  display_name: "xiaoqi-info-card"
  short_description: "生成米白底浅色高亮的技术手绘信息卡"
  default_prompt: "把这段技术内容生成米白底手绘图解卡片，默认 16:9；可按我指定的比例、张数和语言输出。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    generic: "neutral-source"
