interface:
  display_name: "xiaoqi-tech-note"
  short_description: "生成或改写小七风格手绘技术解释图提示词"
  default_prompt: "把这个技术概念生成小七风格手绘技术解释图，默认 16:9、英文可见文字；如果我指定中文、双语、比例或只要提示词，请按我的要求执行。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    generic: "neutral-source"
