interface:
  display_name: "xiaoqi-white"
  short_description: "生成中文白板风黑线手绘知识卡"
  default_prompt: "把这段内容生成白板风手绘知识卡，默认 16:9；如果我指定比例、张数或重点句，请按我的要求执行。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    generic: "neutral-source"
